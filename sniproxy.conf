# SNIProxy configuration - TCP only (dlundquist/sniproxy)
# Handles HTTP (port 80) and TLS (port 443) transparent proxying
# UDP/QUIC is handled by quic-proxy (separate Go program)

user nobody
pidfile /var/run/sniproxy.pid

resolver {
__SNIPROXY_NAMESERVERS__
    mode ipv4_only
}

# Error logging
error_log {
    syslog daemon
    priority notice
}

# Access logging (optional, uncomment if needed)
# access_log {
#     filename /var/log/sniproxy/access.log
#     priority debug
# }

# HTTP listener (TCP)
listener 0.0.0.0:80 {
    protocol http
    table http_hosts
}

# HTTPS/TLS listener (TCP)
listener 0.0.0.0:443 {
    protocol tls
    table tls_hosts
}

# Fallback table: proxy any hostname to its own port 80/443
# This means we do NOT need to maintain an exhaustive domain list.
table http_hosts {
    .* *:80
}

table tls_hosts {
    .* *:443
}
